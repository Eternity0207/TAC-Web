# =========================
# HTTP (PORT 80)
# =========================

server {
    listen 80;
    server_name theawlacompany.com www.theawlacompany.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Certbot verification (HIGH PRIORITY)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /backend/ {
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass http://tac-web-backend:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://tac-web-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.theawlacompany.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Certbot verification
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://tac-web-backend:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


