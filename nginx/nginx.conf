# =========================
# HTTP (PORT 80)
# =========================

# Main domain: allow ACME challenge over HTTP, redirect everything else to HTTPS.
server {
    listen 80;
    server_name theawlacompany.com www.theawlacompany.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API domain: allow ACME challenge over HTTP, redirect everything else to HTTPS.
server {
    listen 80;
    server_name api.theawlacompany.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# =========================
# HTTPS (PORT 443)
# =========================

# Main domain over TLS.
server {
    listen 443 ssl;
    server_name theawlacompany.com www.theawlacompany.com;

    ssl_certificate /etc/letsencrypt/live/theawlacompany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theawlacompany.com/privkey.pem;

    resolver 127.0.0.11 ipv6=off valid=30s;

    location /backend/ {
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass http://tac-web-backend:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://tac-web-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API domain over TLS.
server {
    listen 443 ssl;
    server_name api.theawlacompany.com;

    ssl_certificate /etc/letsencrypt/live/theawlacompany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theawlacompany.com/privkey.pem;

    resolver 127.0.0.11 ipv6=off valid=30s;

    location / {
        proxy_pass http://tac-web-backend:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
