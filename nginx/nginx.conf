server {
    listen 80;
    server_name domain.com localhost;

    location ~* /(?:\.env(?:\..*)?|\.git(?:/.*)?|\.aws(?:/.*)?|vendor/phpunit(?:/.*)?|cgi-bin(?:/.*)?|wp-admin(?:/.*)?|wp-login\.php|wp-content(?:/.*)?|wp-includes(?:/.*)?|phpinfo(?:\.php)?|debug\.php|info\.php|test\.php|i\.php|pi\.php|pinfo\.php|old_phpinfo\.php|temp\.php|server\.js|_ignition(?:/.*)?|actuator(?:/.*)?|solr(?:/.*)?|appsettings(?:\..*)?\.json|application\.(?:yml|properties)|connectionstrings\.config|parameters\.yml|secrets\.json|config\.json)$ {
        return 404;
    }

    location ~ /\.(?!well-known) {
        return 404;
    }

    location = /backend {
        return 301 /backend/;
    }

    location /backend/ {
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass http://backend:3003;
    }

    location / {
        proxy_pass http://frontend:80;
    }
}

server {
    listen 80;
    server_name api.domain.com api.localhost;

    location ~* /(?:\.env(?:\..*)?|\.git(?:/.*)?|\.aws(?:/.*)?|vendor/phpunit(?:/.*)?|cgi-bin(?:/.*)?|wp-admin(?:/.*)?|wp-login\.php|wp-content(?:/.*)?|wp-includes(?:/.*)?|phpinfo(?:\.php)?|debug\.php|info\.php|test\.php|i\.php|pi\.php|pinfo\.php|old_phpinfo\.php|temp\.php|server\.js|_ignition(?:/.*)?|actuator(?:/.*)?|solr(?:/.*)?|appsettings(?:\..*)?\.json|application\.(?:yml|properties)|connectionstrings\.config|parameters\.yml|secrets\.json|config\.json)$ {
        return 404;
    }

    location ~ /\.(?!well-known) {
        return 404;
    }

    location / {
        proxy_pass http://backend:3003;
    }
}
