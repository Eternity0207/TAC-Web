services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tac-web-frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tac-web-backend

  nginx:
    image: nginx:alpine
    container_name: tac-web-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
