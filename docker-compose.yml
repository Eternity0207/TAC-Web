version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tac_backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    expose:
      - "3003"
    networks:
      - tac_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tac_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - tac_net

  nginx:
    image: nginx:1.27-alpine
    container_name: tac_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      # - "443:443"  # Enable after TLS certificates are configured
    volumes:
      - ./deployment/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      # Optional: mount certs after enabling HTTPS
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - tac_net

networks:
  tac_net:
    driver: bridge
