services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tac-web-frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tac-web-backend
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:alpine
    container_name: tac-web-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
