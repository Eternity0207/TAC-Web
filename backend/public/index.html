    /* Ensure left pane/sidebar remains scrollable even if bundled styles disable overflow */

  <!-- Override API URL for local development -->
  <script>
    // Set environment variables before app loads
    window.VITE_API_URL = 'http://localhost:3003/api';
    window.API_BASE_URL = 'http://localhost:3003/api';
    window.REACT_APP_API_URL = 'http://localhost:3003/api';

    // Comprehensive fetch override
    const originalFetch = window.fetch;
    window.fetch = function(input, init) {
      let url = input;

      if (typeof input === 'string') {
        url = input.replace(/https?:\/\/api\.theawlacompany\.com/g, 'http://localhost:3003');
        url = url.replace('api.theawlacompany.com', 'localhost:3003');
      } else if (input instanceof Request) {
        const newUrl = input.url.replace(/https?:\/\/api\.theawlacompany\.com/g, 'http://localhost:3003');
        url = new Request(newUrl, input);
      }

      console.log('API Request:', typeof url === 'string' ? url : url.url);
      return originalFetch.call(this, url, init);
    };

    // Override XMLHttpRequest for Axios compatibility
    const originalXHROpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url, ...args) {
      if (typeof url === 'string') {
        url = url.replace(/https?:\/\/api\.theawlacompany\.com/g, 'http://localhost:3003');
        url = url.replace('api.theawlacompany.com', 'localhost:3003');
        console.log('XHR Request:', url);
      }
      return originalXHROpen.call(this, method, url, ...args);
    };

    // Override axios if it's used
    window.addEventListener('DOMContentLoaded', function() {
      if (window.axios) {
        window.axios.defaults.baseURL = 'http://localhost:3003/api';
        console.log('Axios baseURL set to localhost:3003');
      }
    });
  </script>
